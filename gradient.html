<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient</title>
    <style>
        body{
            background-color: aquamarine;
        }
        p{
            color: blueviolet;
            font-size: 1in;
            background: linear-gradient(to left,yellow,blue,purple,midnightblue,azure,lightblue);
        }
        div{
            height: 300px;
            width: 300px;
            margin: 30px;
            float: left;
        }
    </style>
</head>
<body>
    <p>Ми вивчаємо градієнти</p>
    <div style="background: linear-gradient(yellow,blue);"></div>
    <div style="background: linear-gradient(to right,yellow,blue);"></div>
    <div style="background: linear-gradient(45deg,yellow,blue);"></div>
    <div style="background: linear-gradient(225deg,yellow,blue);"></div>
    <div style="background: linear-gradient(45deg,yellow 50%,blue);"></div>
    <div style="background: linear-gradient(45deg,yellow 50%,blue 50%);"></div>
    <div style="background: linear-gradient(45deg,yellow 25%,blue 75%);"></div>
    <div style="background: linear-gradient(360deg,yellow 0% 50%,blue 50% 100%); width: 450px;"></div>
    <div style="background: linear-gradient(red 25%,darkblue 25% 50%, yellow 50% 75%, darkgreen 75%  100%); width: 450px;"></div>
    <div style="background: linear-gradient(red 25%,darkblue 50%, yellow 75%, darkgreen 100%); width: 450px;"></div>
<div style="background: linear-gradient(
  to left,
  #333333,
  #333333 50%,
  #eeeeee 75%,
  #333333 75%
);"></div>
    <div style="background: radial-gradient(yellow,blue);"></div>
    <div style="background: radial-gradient(yellow 30%,blue);"></div>
    <div style="background: radial-gradient(yellow 30%,blue 70%); border-radius: 25%;"></div>
    <div style="background: radial-gradient(yellow 30%,blue 70%); border-radius: 50%;"></div>
    <div style="background: radial-gradient(circle at 25% 25%,yellow 30%,blue 70%); border-radius: 50%;"></div>
    <div style="background: radial-gradient(circle at 75% 75%,yellow 30%,blue 70%); border-radius: 50%;"></div>
    <div style="background: radial-gradient(circle at 50% 100%,yellow 30%,blue 70%); border-radius: 0%;"></div>
    <div style="background: radial-gradient(circle at 0% 50%,yellow 30%,blue 70%); border-radius: 0%;"></div>
    <div style="background: radial-gradient(circle at 0% 50%,yellow 50%,blue 50%); border-radius: 0%;"></div>
    <div style="background: radial-gradient(circle at 50% 50%,yellow 50%,blue 50%); border-radius: 0%;"></div>
    <div style="background: radial-gradient(red 25%,darkblue 25% 50%, yellow 50% 75%, darkgreen 75%  100%);"></div>
<div style="background: radial-gradient(closest-side, #3f87a6, #ebf8e1, #f69d3c);"></div>
<div style="background: radial-gradient(
  circle at 100%,
  #333333,
  #333333 50%,
  #eeeeee 75%,
  #333333 75%
);"></div>
    <div style="background: radial-gradient(circle, red 25%,darkblue 25% 50%, yellow 50% 75%, darkgreen 75%  100%); width: 450px;"></div>
    <div style="background: conic-gradient(yellow,blue);"></div>
    <div style="background: conic-gradient(yellow,blue,green,violet,purple);"></div>
    <div style="background: conic-gradient(at 25% 25%,yellow,blue,green,violet,purple);"></div>
    <div style="background: conic-gradient(at 75% 75%,yellow,blue,green,violet,purple);"></div>
    <div style="background: conic-gradient(from 45deg,yellow,blue,green,violet,purple);"></div>
    <div style="background: conic-gradient(red 25%,darkblue 25% 50%, yellow 50% 75%, darkgreen 75%  100%);"></div>
    <div style="background: conic-gradient(red 15%,darkblue 15% 30%, yellow 30% 45%, darkgreen 45%  60%, black 60% 75%, white 75% 90%, pink 90%);"></div>

    <div style="background: repeating-linear-gradient(yellow 10%,blue 20%);"></div>
    <div style="background: repeating-linear-gradient(45deg,yellow 10%,blue 20%);"></div>
    <div style="background: repeating-linear-gradient(45deg,yellow 0% 10%,blue 10% 20%);"></div>
    <div style="background: repeating-linear-gradient(45deg,yellow 0% 5%,blue 5% 10%);"></div>
    <div style="background: repeating-radial-gradient(yellow 10%,blue 20%);"></div>
    <div style="background: repeating-radial-gradient(yellow 0% 5%,blue 5% 10%); border-radius: 50%;"></div>
    <div style="background: repeating-conic-gradient(yellow 0% 5%,blue 5% 10%);"></div>
    <div style="background: repeating-conic-gradient(yellow 5%,blue 10%);"></div>
    <div style="background: repeating-conic-gradient(red 5%,darkblue 10%, yellow 15%, darkgreen 20%, black 25%, white 30%, hotpink 35%, orange 40%);"></div>
    <div style="background:
  repeating-linear-gradient(transparent, #4d9f0c 40px),
  repeating-linear-gradient(0.25turn, transparent, #3f87a6 20px);"></div>
</body>
</html>
