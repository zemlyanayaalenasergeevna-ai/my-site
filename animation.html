<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Mode Square</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
}

/* square */
.square {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 3px solid #00f5d4;
    background: transparent;

    animation: crazyMove 6s infinite linear,
               colorShift 3s infinite alternate,
               pulse 2s infinite ease-in-out;
}

/* movement */
@keyframes crazyMove {
    0%   { top: 0; left: 0; transform: rotate(0deg); }
    25%  { top: 80vh; left: 20vw; transform: rotate(180deg); }
    50%  { top: 40vh; left: 80vw; transform: rotate(360deg); }
    75%  { top: 10vh; left: 50vw; transform: rotate(540deg); }
    100% { top: 0; left: 0; transform: rotate(720deg); }
}

/* glowing color change */
@keyframes colorShift {
    0% {
        border-color: #00f5d4;
        box-shadow: 0 0 10px #00f5d4;
    }
    50% {
        border-color: #ff00ff;
        box-shadow: 0 0 20px #ff00ff;
    }
    100% {
        border-color: #ffd700;
        box-shadow: 0 0 30px #ffd700;
    }
}

/* pulse size */
@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.3);
    }
}
</style>

</head>

<body>

<div class="square"></div>

</body>
</html>
