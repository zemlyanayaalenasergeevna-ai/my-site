<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shapes Wikipedia</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

/* layout */
.shapes {
    display: flex;
    gap: 40px;
    margin-top: 30px;
}

/* remove link underline */
.shapes a {
    text-decoration: none;
}

/* hover effect */
.shapes a:hover {
    opacity: 0.7;
    transform: scale(1.05);
}

/* rectangle */
.rectangle {
    width: 300px;
    height: 100px;
    border: 4px solid red;
    border-radius: 15px;
    background: transparent;
}

/* circle */
.circle {
    width: 120px;
    height: 120px;
    border: 4px solid brown;
    border-radius: 50%;
    background: transparent;
}

/* triangle */
.triangle {
    width: 0;
    height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 120px solid gold;
}
</style>

</head>

<body>

<h2>Click shapes to open Wikipedia</h2>

<div class="shapes">

    <!-- Rectangle -->
    <a href="https://en.wikipedia.org/wiki/Rectangle" target="_blank">
        <div class="rectangle"></div>
    </a>

    <!-- Circle -->
    <a href="https://en.wikipedia.org/wiki/Circle" target="_blank">
        <div class="circle"></div>
    </a>

    <!-- Triangle -->
    <a href="https://en.wikipedia.org/wiki/Triangle" target="_blank">
        <div class="triangle"></div>
    </a>

</div>

</body>
</html>
