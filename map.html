<!DOCTYPE html>
<html lang="en">

<body>

<h2>Click shapes to open Wikipedia</h2>

<!-- 🖼 IMAGE -->
<img width="300" height="100" alt="u_fg0tkeqgiy-ruby-red-7290502" src="https://github.com/user-attachments/assets/c419939c-dae9-4af8-9099-93299494e4b2" />

<map name="figures">

</html>
